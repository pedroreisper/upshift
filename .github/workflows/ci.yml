name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint shell scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          shellcheck hooks/install_hook.sh scripts/doctor.sh tests/run-tests.sh
      - name: Syntax-check hook
        run: python3 -c "import ast; ast.parse(open('hooks/upshift_router.py').read())"
      - name: Run hook classification tests
        run: bash tests/run-tests.sh
      - name: Doctor (file presence + behaviour)
        run: bash scripts/doctor.sh
